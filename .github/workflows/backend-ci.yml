name: Backend CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Java
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3️⃣ Cache Maven dependencies
      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('Backend/expanse-tracker-backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven

      # 4️⃣ Build project
      - name: Build Backend
        working-directory: Backend/expanse-tracker-backend
        run: mvn clean verify

      # 5️⃣ Print test reports if failure
      - name: Print Test Reports
        if: failure()
        working-directory: Backend/expanse-tracker-backend
        run: |
          echo "===== TEST REPORTS ====="
          ls target/surefire-reports || true
          cat target/surefire-reports/*.txt || true
