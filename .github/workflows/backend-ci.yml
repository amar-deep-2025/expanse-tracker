name: Backend CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Backend
        run: |
          cd Backend/expanse-tracker-backend
          mvn clean install -e -X

      # 🔥 ADD THIS (MOST IMPORTANT)
      - name: Print Test Reports
        if: failure()
        run: |
          cd Backend/expanse-tracker-backend
          echo "===== TEST REPORTS ====="
          ls target/surefire-reports || true
          cat target/surefire-reports/*.txt || true
