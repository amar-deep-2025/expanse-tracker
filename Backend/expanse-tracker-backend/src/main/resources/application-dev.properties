# ===============================
# SERVER CONFIG
# ===============================
server.port=8080
spring.application.name=expanse-tracker-backend-dev

# ===============================
# DATABASE CONFIG (LOCAL MYSQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/expanse_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# JWT CONFIG (LOCAL)
# ===============================
jwt.secret=myLocalSecretKey12345678901234567890
jwt.expiration=3600000

# ===============================
# OPTIONAL (GOOD PRACTICE)
# ===============================
spring.jpa.open-in-view=false